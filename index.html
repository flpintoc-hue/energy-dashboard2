*{margin:0;padding:0;box-sizing:border-box}
:root{
  --orange:#F47C20;--orange-dk:#d46a10;--orange-lt:#FFF3E0;
  --green:#2ECC71;--green-dk:#1B5E20;--green-lt:#E8F5E9;
  --blue:#2196F3;--blue-dk:#1565C0;--blue-lt:#E3F2FD;
  --teal:#00BCD4;--red:#E53935;--red-lt:#FFEBEE;

  --navy:#111827;--navy-mid:#1e293b;
  --bg:#f1f5f9;--card:#fff;--text:#0f172a;--muted:#64748b;
  --border:#e2e8f0;
  --sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh-md:0 4px 6px rgba(0,0,0,.05),0 2px 4px rgba(0,0,0,.04);
  --sh-lg:0 10px 25px rgba(0,0,0,.08);
  --radius:12px;
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
input,select,textarea,button{font-family:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:#94a3b8}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes pulse-ring{0%{transform:scale(.85);opacity:1}70%{transform:scale(1.5);opacity:0}100%{transform:scale(.85);opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slide-in{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.fade-up{animation:fadeUp .4s ease both}
.fade-in{animation:fadeIn .3s ease both}
.slide-in{animation:slide-in .35s ease both}
@media(max-width:768px){
  .hide-mobile{display:none!important}
  .stack-mobile{flex-direction:column!important}
  .full-mobile{grid-template-columns:1fr!important}
}
</style>

/* ═══════════════════════════════════════════════════════
   LOGIN
═══════════════════════════════════════════════════════ */
function LoginScreen({onLogin}){
  const[user,setUser]=useState('');
  const[pass,setPass]=useState('');
  const[err,setErr]=useState('');
  const[loading,setLoading]=useState(false);

  const go=()=>{
    if(!user.trim()||!pass.trim()){setErr('Enter username and password');return;}
    setLoading(true);
    setTimeout(()=>{
      const f=MOCK_USERS.find(u=>u.username===user.trim()&&u.password===pass);
      if(f&&f.active)onLogin(f);
      else if(f&&!f.active)setErr('⛔ Your access has been deactivated');
      else setErr('Incorrect username or password');
      setLoading(false);
    },700);
  };

  const iStyle={width:'100%',background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.12)',
    borderRadius:12,padding:'14px 16px',color:'#fff',fontSize:'.92rem',fontWeight:600,outline:'none',boxSizing:'border-box'};
  const lStyle={display:'block',fontSize:'.62rem',fontWeight:800,textTransform:'uppercase',
    letterSpacing:'.12em',color:'rgba(255,255,255,.4)',marginBottom:6};

  return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',
      background:'linear-gradient(135deg,#0c0f1a 0%,#111827 40%,#1e293b 100%)',position:'relative',overflow:'hidden'}}>
      <div style={{position:'absolute',inset:0,
        backgroundImage:'radial-gradient(rgba(244,124,32,.08) 1px,transparent 1px)',backgroundSize:'32px 32px'}}/>
      <div style={{position:'absolute',top:'-20%',right:'-10%',width:500,height:500,borderRadius:'50%',
        background:'radial-gradient(circle,rgba(244,124,32,.06),transparent 70%)'}}/>

      <div className="fade-up" style={{background:'rgba(255,255,255,.03)',backdropFilter:'blur(20px)',
        border:'1px solid rgba(255,255,255,.08)',borderRadius:28,padding:'52px 44px',
        width:'min(440px,92vw)',position:'relative',zIndex:1,boxShadow:'0 40px 80px rgba(0,0,0,.5)'}}>

        <div style={{textAlign:'center',marginBottom:40}}>
          <div style={{fontSize:'3.2rem',marginBottom:10,filter:'drop-shadow(0 0 20px rgba(244,124,32,.4))'}}>⚡</div>
          <h1 style={{fontSize:'1.5rem',fontWeight:900,color:'#fff',letterSpacing:'.08em',
            textTransform:'uppercase',lineHeight:1.2}}>Energy Dashboard</h1>
          <p style={{fontSize:'.7rem',color:'rgba(255,255,255,.28)',marginTop:8,letterSpacing:'.14em',
            textTransform:'uppercase'}}>Supplier Management · Sales · CRM</p>
        </div>

        {err&&<div style={{background:'rgba(229,57,53,.1)',border:'1px solid rgba(229,57,53,.25)',
          borderRadius:10,padding:'11px 16px',color:'#f87171',fontSize:'.82rem',fontWeight:700,
          marginBottom:16,textAlign:'center',animation:'shake .35s ease'}}>{err}</div>}

        <div style={{marginBottom:16}}>
          <label style={lStyle}>Username</label>
          <input value={user} onChange={e=>{setUser(e.target.value);setErr('')}}
            onKeyDown={e=>e.key==='Enter'&&go()} placeholder="Enter your username" style={iStyle}/>
        </div>
        <div style={{marginBottom:24}}>
          <label style={lStyle}>Password</label>
          <input value={pass} onChange={e=>{setPass(e.target.value);setErr('')}}
            onKeyDown={e=>e.key==='Enter'&&go()} type="password" placeholder="••••••••" style={iStyle}/>
        </div>

        <button onClick={go} disabled={loading}
          style={{width:'100%',padding:16,background:'var(--orange)',border:'none',borderRadius:14,
            color:'#fff',fontWeight:900,fontSize:'.95rem',letterSpacing:'.06em',textTransform:'uppercase',

          letterSpacing:'.06em'}}>Demo: admin / admin123 · agent1 / agent123</p>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   STEP NAVIGATION BAR
═══════════════════════════════════════════════════════ */
const STEP_LABELS = ['DNC','State','Utility','Supplier & Rates','Checklist'];
const STEP_ICONS  = ['shield','map','zap','layers','clipboard'];

function StepNav({current,onGo}){
  return(
    <div style={{background:'var(--blue)',display:'flex',alignItems:'center',justifyContent:'center',
      gap:0,padding:'0 12px',overflowX:'auto'}}>
      {STEP_LABELS.map((label,i)=>{
        const active=i===current, done=i<current;
        return(
          <Fragment key={i}>
            <button onClick={()=>onGo(i)} style={{display:'flex',alignItems:'center',gap:7,
              padding:'13px 16px',background:'none',border:'none',
              borderBottom:`3px solid ${active?'#fbbf24':'transparent'}`,
              color:active?'#fbbf24':done?'var(--green)':'rgba(255,255,255,.3)',
              fontWeight:800,fontSize:'.72rem',letterSpacing:'.04em',textTransform:'uppercase',
              cursor:'pointer',whiteSpace:'nowrap',transition:'all .2s'}}>
              <span style={{width:24,height:24,borderRadius:'50%',
                background:active?'var(--orange)':done?'var(--green)':'rgba(255,255,255,.1)',
                display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:'.7rem',fontWeight:900,color:'#fff',flexShrink:0}}>
                {done?'✓':(i+1)}
              </span>
              <span className="hide-mobile">{label}</span>
            </button>
            {i<4&&<span style={{color:'rgba(255,255,255,.12)',fontSize:'.7rem',margin:'0 2px'}}>›</span>}
          </Fragment>
        );
      })}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   CONTEXT BAR (breadcrumb of selections)
═══════════════════════════════════════════════════════ */
function ContextBar({sel}){
  const tags=[];
  if(sel.state)tags.push({label:'State',value:`${sel.state.code} — ${sel.state.name}`,color:'var(--orange)',icon:'📍'});
  if(sel.utils&&sel.utils.length)sel.utils.forEach(u=>tags.push({label:'Utility',value:u.name,
    color:'var(--blue)',icon:u.type==='gas'?'🔥':'⚡'}));
  if(sel.supplier)tags.push({label:'Supplier',value:sel.supplier.name,color:'var(--teal)',icon:'🏢'});
  if(!tags.length)return null;
  return(
    <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:18}}>
      {tags.map((t,i)=>(
        <div key={i} style={{display:'flex',alignItems:'center',gap:6,background:'#fff',
          border:'1.5px solid var(--border)',borderRadius:8,padding:'5px 12px',fontSize:'.72rem',
          fontWeight:700,color:'var(--muted)',boxShadow:'var(--sh)'}}>
          <span>{t.icon}</span>
          <span style={{fontSize:'.58rem',textTransform:'uppercase',letterSpacing:'.06em'}}>{t.label}</span>
          <span style={{color:t.color,fontWeight:900}}>{t.value}</span>
        </div>
      ))}

  );
}

/* ═══════════════════════════════════════════════════════
   STEP 0 — DNC VALIDATOR
═══════════════════════════════════════════════════════ */
function StepDNC({onClear}){
  const[phone,setPhone]=useState('');
  const[result,setResult]=useState(null);
  const[busy,setBusy]=useState(false);
  const digits=phone.replace(/\D/g,'');

  const check=()=>{
    if(digits.length!==10)return;
    setBusy(true);
    setTimeout(()=>{setResult(DNC_LIST.includes(digits)?'blocked':'clear');setBusy(false);},800);
  };

  return(
    <div className="fade-up" style={{maxWidth:640,margin:'0 auto'}}>
      <div style={{background:'#fff',borderRadius:18,overflow:'hidden',boxShadow:'var(--sh-lg)'}}>
        {/* Header */}
        <div style={{background:'linear-gradient(135deg,var(--navy),var(--navy-mid))',padding:'28px 32px',
          display:'flex',alignItems:'center',gap:18}}>
          <div style={{fontSize:'2.4rem',position:'relative'}}>
            🚫
            <div style={{position:'absolute',inset:-10,border:'2.5px solid rgba(255,255,255,.25)',
              borderRadius:'50%',animation:'pulse-ring 2s ease-out infinite'}}/>
          </div>
          <div>
            <h3 style={{color:'#fff',fontWeight:900,fontSize:'1.15rem',margin:0}}>Do Not Call — Validator</h3>
            <p style={{color:'rgba(255,255,255,.4)',fontSize:'.78rem',margin:'5px 0 0'}}>
              Verify the customer number before proceeding with the sale</p>
          </div>
        </div>

        {/* Body */}
        <div style={{padding:'28px 32px'}}>
          {/* Status bar */}
          <div style={{display:'flex',alignItems:'center',gap:10,background:'#f8fafc',borderRadius:10,
            padding:'10px 16px',marginBottom:22,fontSize:'.78rem'}}>
            <div style={{width:9,height:9,borderRadius:'50%',background:'var(--green)',
              boxShadow:'0 0 6px rgba(46,204,113,.5)'}}/>
            <span style={{color:'var(--muted)',fontWeight:700}}>🔒 DNC list active — secure verification</span>
          </div>

          {/* Input */}
          <div style={{display:'flex',gap:10,marginBottom:22}}>
            <input value={phone} onChange={e=>{setPhone(e.target.value.replace(/\D/g,'').slice(0,10));setResult(null);}}
              onKeyDown={e=>e.key==='Enter'&&check()} placeholder="5551234567" maxLength={10}
              style={{flex:1,border:'2px solid var(--border)',borderRadius:14,padding:'15px 20px',
                fontSize:'1.1rem',fontWeight:700,letterSpacing:'.06em',outline:'none',
                transition:'border-color .2s',boxSizing:'border-box'}}/>
            <button onClick={check} disabled={busy||digits.length!==10}
              style={{background:'var(--blue)',color:'#fff',border:'none',borderRadius:14,
                padding:'15px 26px',fontWeight:900,fontSize:'.9rem',cursor:'pointer',whiteSpace:'nowrap',
                opacity:busy||digits.length!==10?.45:1,boxShadow:'0 4px 14px rgba(33,150,243,.25)',
                transition:'all .2s'}}>
              {busy?'Checking...':'Verify'}
            </button>
          </div>

          {/* Result */}
          {result==='clear'&&(
            <div className="fade-up" style={{display:'flex',alignItems:'center',gap:16,
              background:'var(--green-lt)',border:'2px solid #a5d6a7',borderRadius:14,
              padding:'18px 22px',marginBottom:22}}>
              <span style={{fontSize:'2rem'}}>✅</span>
              <div>
                <div style={{fontWeight:900,fontSize:'1.05rem',color:'var(--green-dk)'}}>Number Clear — Can Proceed</div>
                <div style={{fontSize:'.8rem',color:'var(--green-dk)',opacity:.75,marginTop:2}}>
                  {phone} is not on the DNC list</div>
              </div>
            </div>
          )}
          {result==='blocked'&&(
            <div className="fade-up" style={{display:'flex',alignItems:'center',gap:16,
              background:'var(--red-lt)',border:'2px solid #ef9a9a',borderRadius:14,
              padding:'18px 22px',marginBottom:22}}>
              <span style={{fontSize:'2rem'}}>🚫</span>
              <div>
                <div style={{fontWeight:900,fontSize:'1.05rem',color:'var(--red)'}}>NUMBER ON DNC — DO NOT CALL</div>
                <div style={{fontSize:'.8rem',color:'var(--red)',opacity:.75,marginTop:2}}>
                  {phone} is registered on the Do Not Call list</div>
              </div>
            </div>
          )}

          {/* Proceed button */}
          {result==='clear'&&(
            <button className="fade-up" onClick={()=>onClear(phone)}
              style={{width:'100%',background:'var(--green-dk)',color:'#fff',border:'none',borderRadius:14,
                padding:16,fontWeight:900,fontSize:'.95rem',cursor:'pointer',
                boxShadow:'0 4px 16px rgba(27,94,32,.3)',transition:'all .2s'}}>
              ✓ Number Clear — Continue with Sale →
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

        letterSpacing:'.06em',display:'flex',alignItems:'center',gap:8,background:bg,color:clr,
        borderBottom:`2px solid ${bg}`}}>{icon} {title}</div>
      <div style={{padding:'10px 12px',display:'flex',flexDirection:'column',gap:8}}>
        {items.map(u=>{
          const isSel=selected.some(x=>x.id===u.id);
          return(
            <button key={u.id} onClick={()=>onToggle(u)}
              style={{background:isSel?'var(--blue-lt)':'#fff',border:`2px solid ${isSel?'var(--blue)':'var(--border)'}`,

                <div style={{fontWeight:800,fontSize:'.95rem',color:'var(--text)'}}>{u.name}</div>

              </div>
              <span style={{color:isSel?'var(--blue)':'var(--muted)',fontWeight:900,
                fontSize:isSel?'1.1rem':'.75rem',flexShrink:0}}>{isSel?'✓':'+ Add'}</span>
            </button>

  );

  return(
    <div className="fade-up">
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
        <div style={{width:14,height:14,borderRadius:4,background:'var(--orange)'}}/>
        <h2 style={{fontSize:'1.05rem',fontWeight:900,textTransform:'uppercase',margin:0}}>Select Utility</h2>
      </div>
      <p style={{fontSize:'.78rem',color:'var(--muted)',marginBottom:18,fontWeight:600}}>💡 Max 1 electric and 1 gas</p>
      <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
        <Group title="Electricity" icon="⚡" items={elec} bg="var(--orange-lt)" clr="var(--orange)"/>
        <Group title="Gas" icon="🔥" items={gas} bg="var(--green-lt)" clr="var(--green-dk)"/>

      {selected.length>0&&(

          background:'var(--blue-lt)',borderRadius:14,padding:'14px 20px',border:'1.5px solid rgba(33,150,243,.2)',
          flexWrap:'wrap',gap:10}}>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {selected.map(u=>(
              <span key={u.id} style={{background:'var(--blue)',color:'#fff',borderRadius:20,
                padding:'5px 14px',fontSize:'.75rem',fontWeight:800}}>
                {u.type==='gas'?'🔥':'⚡'} {u.name}
              </span>

          </div>
          <button onClick={onProceed} style={{background:'var(--orange)',color:'#fff',border:'none',
            borderRadius:10,padding:'11px 24px',fontWeight:900,fontSize:'.85rem',cursor:'pointer',
            whiteSpace:'nowrap',boxShadow:'0 3px 12px rgba(244,124,32,.3)'}}>
            View Suppliers →
          </button>
        </div>
      )}

  );
}

/* ═══════════════════════════════════════════════════════
   STEP 4 — CHECKLIST + TEMPLATE
═══════════════════════════════════════════════════════ */
function StepChecklist({sel,user,onHome,showToast}){
  const[checked,setChecked]=useState(new Set());
  const[tpl,setTpl]=useState({lang:'English',auth:'',holder:'',phone:sel.phone||'',address:'',city:'',zip:'',acc:'',
    repId:user?.repId||'',tarifa:''});
  const[copied,setCopied]=useState(false);

  useEffect(()=>{
    if(sel.supplier&&sel.rate)setTpl(p=>({...p,
      tarifa:`${sel.supplier.name} — ${sel.rate.price} | ${sel.rate.months}${sel.rate.months!=='MTM'?'m':''} | ETF ${sel.rate.etf}`}));
  },[sel.supplier,sel.rate]);

  const toggle=id=>{const n=new Set(checked);n.has(id)?n.delete(id):n.add(id);setChecked(n);};
  const progress=Math.round((checked.size/CHECKLIST.length)*100);

  const copy=()=>{
    const lines=[`LANGUAGE: ${tpl.lang}`,`AUTHORIZED: ${tpl.auth}`,`ACC HOLDER: ${tpl.holder}`,
      `STATE: ${sel.state?.name||''}`,`PHONE: ${tpl.phone}`,`ADDRESS: ${tpl.address}`,`CITY: ${tpl.city}`,
      `ZIP: ${tpl.zip}`,`ACC INFO: ${tpl.acc}`,`UTILITY: ${(sel.utils||[]).map(u=>u.name).join(', ')}`,
      `REP ID: ${tpl.repId}`,`RATE: ${tpl.tarifa}`].filter(Boolean).join('\n');
    if(navigator.clipboard){
      navigator.clipboard.writeText(lines).then(()=>{setCopied(true);showToast('✓ Template copied!','success');setTimeout(()=>setCopied(false),3000);});
    }else{
      const ta=document.createElement('textarea');ta.value=lines;ta.style.cssText='position:fixed;opacity:0';
      document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
      setCopied(true);showToast('✓ Template copied!','success');setTimeout(()=>setCopied(false),3000);
    }
  };

  const iStyle={width:'100%',border:'1.5px solid var(--border)',borderRadius:9,padding:'10px 13px',
    fontSize:'.84rem',fontWeight:600,outline:'none',background:'#fafbfc',boxSizing:'border-box',transition:'border-color .2s'};

  return(
    <div className="fade-up">
      {/* Summary bar */}
      <div style={{background:'linear-gradient(135deg,var(--orange),var(--orange-dk))',borderRadius:16,
        padding:'20px 26px',color:'#fff',marginBottom:22,display:'flex',gap:28,flexWrap:'wrap',
        alignItems:'center',boxShadow:'0 6px 20px rgba(244,124,32,.3)'}}>
        {[{l:'State',v:sel.state?.code},{l:'Utility',v:(sel.utils||[]).map(u=>u.name).join(', ')},
          {l:'Supplier',v:sel.supplier?.name},{l:'Agent',v:user?.name}].map((item,i)=>(
          <div key={i}><div style={{fontSize:'.56rem',fontWeight:700,textTransform:'uppercase',
            letterSpacing:'.1em',opacity:.7,marginBottom:3}}>{item.l}</div>
            <div style={{fontSize:'1rem',fontWeight:900}}>{item.v||'—'}</div></div>
        ))}
      </div>

      {/* Checklist */}
      <div style={{background:'#fff',borderRadius:16,overflow:'hidden',boxShadow:'var(--sh-md)'}}>
        <div style={{background:'linear-gradient(135deg,var(--orange),var(--orange-dk))',padding:'18px 24px',
          display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span style={{color:'#fff',fontWeight:900,fontSize:'1rem',textTransform:'uppercase',
            letterSpacing:'.04em'}}>📋 Sale Checklist</span>
          <div>
            <div style={{background:'rgba(255,255,255,.2)',borderRadius:100,height:8,width:140,overflow:'hidden'}}>
              <div style={{height:'100%',background:'#fff',borderRadius:100,width:progress+'%',transition:'width .4s'}}/>
            </div>
            <div style={{color:'rgba(255,255,255,.8)',fontSize:'.72rem',fontWeight:700,marginTop:4,
              textAlign:'right'}}>{checked.size}/{CHECKLIST.length} completed</div>
          </div>
        </div>
        {CHECKLIST.map((item,i)=>(
          <div key={item.id} onClick={()=>toggle(item.id)}
            style={{display:'flex',gap:14,padding:'16px 24px',borderBottom:'1px solid var(--border)',
              cursor:'pointer',background:checked.has(item.id)?'#f0fdf4':'transparent',transition:'background .15s'}}>
            <div style={{width:26,height:26,border:`2px solid ${checked.has(item.id)?'var(--green)':'var(--border)'}`,
              borderRadius:8,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',
              background:checked.has(item.id)?'var(--green)':'transparent',color:'#fff',
              fontSize:'.8rem',transition:'all .2s',marginTop:1}}>
              {checked.has(item.id)&&'✓'}
            </div>
            <div>
              <div style={{fontSize:'.58rem',fontWeight:800,textTransform:'uppercase',letterSpacing:'.1em',
                color:checked.has(item.id)?'var(--green-dk)':'var(--orange)',marginBottom:3}}>Step {i+1}</div>
              <div style={{fontWeight:800,fontSize:'.88rem',color:checked.has(item.id)?'var(--muted)':'var(--text)',
                textDecoration:checked.has(item.id)?'line-through':'none'}}>{item.title}</div>
              <div style={{fontSize:'.74rem',color:'var(--muted)',marginTop:3,lineHeight:1.4}}>{item.desc}</div>
            </div>
          </div>
        ))}
      </div>

      {/* Template */}
      <div style={{background:'#fff',borderRadius:16,overflow:'hidden',boxShadow:'var(--sh-md)',marginTop:20,padding:'24px 26px'}}>
        <h3 style={{fontSize:'.92rem',fontWeight:900,textTransform:'uppercase',marginBottom:18,
          color:'var(--text)',display:'flex',alignItems:'center',gap:8}}>📝 Sale Template</h3>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px 18px'}} className="full-mobile">
          {[
            {k:'lang',l:'Language',sel:['English','Spanish']},
            {k:'auth',l:'Authorized *',sel:['','Yes — Account Holder','Yes — Authorized User']},
            {k:'holder',l:'Acc Holder *'},{k:'phone',l:'Phone Number *'},
            {k:'address',l:'Address *',full:true},{k:'city',l:'City *'},{k:'zip',l:'ZIP Code *'},
            {k:'acc',l:'Account Info *',full:true},{k:'repId',l:'Rep ID'},{k:'tarifa',l:'Selected Rate',full:true},
          ].map(f=>(
            <div key={f.k} style={{gridColumn:f.full?'1 / -1':'auto'}}>
              <label style={{display:'block',fontSize:'.6rem',fontWeight:800,textTransform:'uppercase',
                letterSpacing:'.08em',color:'var(--muted)',marginBottom:5}}>{f.l}</label>
              {f.sel?(
                <select value={tpl[f.k]} onChange={e=>setTpl({...tpl,[f.k]:e.target.value})} style={iStyle}>
                  {f.sel.map(o=><option key={o} value={o}>{o||'— Select —'}</option>)}
                </select>
              ):(
                <input value={tpl[f.k]} onChange={e=>setTpl({...tpl,[f.k]:e.target.value})} style={iStyle}/>
              )}
            </div>
          ))}
        </div>
        <div style={{display:'flex',gap:10,marginTop:20,flexWrap:'wrap'}}>
          <button onClick={copy}
            style={{flex:1,minWidth:200,background:copied?'var(--green-dk)':'var(--blue)',color:'#fff',border:'none',
              borderRadius:12,padding:'13px 24px',fontWeight:800,fontSize:'.88rem',cursor:'pointer',
              display:'flex',alignItems:'center',justifyContent:'center',gap:8,
              boxShadow:'0 4px 14px rgba(33,150,243,.25)',transition:'background .3s'}}>
            {copied?'✅ Copied!':'📋 Copy Template'}
          </button>
          <button onClick={onHome}
            style={{background:'var(--orange)',color:'#fff',border:'none',borderRadius:12,
              padding:'13px 24px',fontWeight:900,fontSize:'.88rem',cursor:'pointer',
              display:'flex',alignItems:'center',gap:8,boxShadow:'0 4px 14px rgba(244,124,32,.3)'}}>
            🏠 New Sale
          </button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   CRM DASHBOARD (NEW MODULE)
═══════════════════════════════════════════════════════ */
function CRMDashboard({user}){
  const[tab,setTab]=useState('overview');
  const[range,setRange]=useState('month');
  const[search,setSearch]=useState('');
  const now=new Date();

  const filtered=useMemo(()=>{
    let s=SALES;
    if(user.role!=='admin')s=s.filter(x=>x.agent===user.name);
    if(range==='week')s=s.filter(x=>(now-new Date(x.date))/864e5<=7);
    else if(range==='month')s=s.filter(x=>new Date(x.date).getMonth()===now.getMonth());
    if(search)s=s.filter(x=>Object.values(x).some(v=>String(v).toLowerCase().includes(search.toLowerCase())));
    return s;
  },[range,search,user]);

  const completed=filtered.filter(s=>s.status==='completed');
  const pending=filtered.filter(s=>s.status==='pending');
  const inProg=filtered.filter(s=>s.status==='in_progress');
  const cancelled=filtered.filter(s=>s.status==='cancelled');
  const convRate=filtered.length>0?Math.round(completed.length/filtered.length*100):0;
  const totalVal=completed.reduce((a,s)=>a+s.value,0);

  // Daily data for simple bar chart
  const dailyMap={};
  filtered.forEach(s=>{dailyMap[s.date]=(dailyMap[s.date]||0)+1;});
  const dailyArr=Object.entries(dailyMap).sort(([a],[b])=>a.localeCompare(b)).slice(-14);
  const maxDay=Math.max(...dailyArr.map(([,v])=>v),1);

  // By supplier
  const suppMap={};filtered.forEach(s=>{suppMap[s.supplier]=(suppMap[s.supplier]||0)+1;});
  const suppArr=Object.entries(suppMap).sort(([,a],[,b])=>b-a);
  const maxSupp=Math.max(...suppArr.map(([,v])=>v),1);

  // By state
  const stateMap={};filtered.forEach(s=>{stateMap[s.state]=(stateMap[s.state]||0)+1;});
  const stateArr=Object.entries(stateMap).sort(([,a],[,b])=>b-a);

  // Agent performance
  const agentMap={};
  filtered.forEach(s=>{
    if(!agentMap[s.agent])agentMap[s.agent]={name:s.agent,total:0,done:0,val:0};
    agentMap[s.agent].total++;
    if(s.status==='completed'){agentMap[s.agent].done++;agentMap[s.agent].val+=s.value;}
  });
  const agentArr=Object.values(agentMap).sort((a,b)=>b.done-a.done);
  const maxAgent=Math.max(...agentArr.map(a=>a.total),1);

  const colors=['#F47C20','#2196F3','#2ECC71','#E53935','#9C27B0','#00BCD4','#FF9800'];

  const Metric=({icon,label,value,sub,color='var(--orange)'})=>(
    <div style={{background:'#fff',borderRadius:14,padding:'20px 22px',boxShadow:'var(--sh-md)',
      borderLeft:`4px solid ${color}`}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
        <div style={{width:38,height:38,borderRadius:10,background:color+'15',display:'flex',
          alignItems:'center',justifyContent:'center',fontSize:'1.2rem'}}>{icon}</div>
        <span style={{fontSize:'.7rem',fontWeight:800,color:'var(--muted)',textTransform:'uppercase',
          letterSpacing:'.06em'}}>{label}</span>
      </div>
      <div style={{fontSize:'1.9rem',fontWeight:900,color:'var(--text)',lineHeight:1}}>{value}</div>
      {sub&&<div style={{fontSize:'.72rem',color:'var(--muted)',fontWeight:700,marginTop:5}}>{sub}</div>}
    </div>
  );

  const StatusBadge=({status})=>{
    const m={completed:{bg:'var(--green-lt)',c:'var(--green-dk)',l:'Completed'},
      pending:{bg:'var(--yellow-lt)',c:'#e65100',l:'Pending'},
      in_progress:{bg:'var(--blue-lt)',c:'var(--blue-dk)',l:'In Progress'},
      cancelled:{bg:'var(--red-lt)',c:'var(--red)',l:'Cancelled'}};
    const s=m[status]||m.pending;
    return(<span style={{display:'inline-block',background:s.bg,color:s.c,padding:'3px 10px',
      borderRadius:20,fontSize:'.68rem',fontWeight:800,textTransform:'uppercase'}}>{s.l}</span>);
  };

  const SimpleBar=({data,max,color='var(--orange)',height=120})=>(
    <div style={{display:'flex',alignItems:'flex-end',gap:4,height,padding:'0 4px'}}>
      {data.map(([label,val],i)=>{
        const pct=Math.max(Math.round(val/max*100),4);
        return(
          <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
            <span style={{fontSize:'.62rem',fontWeight:900,color:'var(--text)'}}>{val}</span>
            <div style={{width:'100%',height:pct+'%',background:`linear-gradient(180deg,${color},${color}99)`,
              borderRadius:'4px 4px 0 0',minHeight:3,transition:'height .5s cubic-bezier(.34,1.56,.64,1)'}}/>
            <span style={{fontSize:'.52rem',color:'var(--muted)',fontWeight:700,textAlign:'center',
              whiteSpace:'nowrap',overflow:'hidden',maxWidth:'100%'}}>{label.slice(5)}</span>
          </div>
        );
      })}
    </div>
  );

  const HBar=({data,max,colors:clrs})=>(
    <div style={{display:'flex',flexDirection:'column',gap:10}}>
      {data.map(([name,val],i)=>(
        <div key={i}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
            <span style={{fontSize:'.78rem',fontWeight:800}}>{name}</span>
            <span style={{fontSize:'.82rem',fontWeight:900,color:clrs[i%clrs.length]}}>{val}</span>
          </div>
          <div style={{background:'#f1f5f9',borderRadius:6,height:10,overflow:'hidden'}}>
            <div style={{width:Math.round(val/max*100)+'%',height:'100%',
              background:clrs[i%clrs.length],borderRadius:6,transition:'width .6s ease'}}/>
          </div>
        </div>
      ))}
    </div>
  );

  return(
    <div className="fade-up">
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18,flexWrap:'wrap',gap:10}}>
        <h2 style={{fontSize:'1.15rem',fontWeight:900,margin:0,display:'flex',alignItems:'center',gap:8}}>
          📈 CRM Dashboard</h2>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <div style={{display:'flex',borderRadius:10,overflow:'hidden',border:'1.5px solid var(--border)'}}>
            {['week','month','all'].map(p=>(
              <button key={p} onClick={()=>setRange(p)}
                style={{padding:'8px 16px',border:'none',background:range===p?'var(--orange)':'#fff',
                  color:range===p?'#fff':'var(--muted)',fontWeight:800,fontSize:'.72rem',cursor:'pointer',
                  textTransform:'capitalize'}}>{p}</button>
            ))}
          </div>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search..."
            style={{border:'1.5px solid var(--border)',borderRadius:10,padding:'8px 14px',fontSize:'.78rem',outline:'none',width:160}}/>
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:'flex',gap:4,background:'#fff',borderRadius:12,padding:4,boxShadow:'var(--sh)',marginBottom:22}}>
        {[{k:'overview',l:'Overview',i:'📊'},{k:'pipeline',l:'Pipeline',i:'🎯'},
          ...(user.role==='admin'?[{k:'agents',l:'Team',i:'👥'}]:[]),

        ].map(t=>(

              padding:'11px 14px',borderRadius:10,border:'none',
              background:tab===t.k?'var(--orange)':'transparent',
              color:tab===t.k?'#fff':'var(--muted)',fontWeight:800,fontSize:'.78rem',cursor:'pointer',
              transition:'all .2s'}}>
            <span>{t.i}</span><span className="hide-mobile">{t.l}</span>

      </div>

      {/* ──── OVERVIEW ──── */}
      {tab==='overview'&&(<>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:14,marginBottom:22}}>
          <Metric icon="📊" label="Total Sales" value={filtered.length} sub={`${completed.length} completed`} color="var(--blue)"/>
          <Metric icon="💰" label="Revenue" value={`$${fmt(totalVal)}`} sub="Commission earned" color="var(--green)"/>
          <Metric icon="🎯" label="Conversion" value={`${convRate}%`} sub={`${pending.length} pending`} color="var(--orange)"/>
          <Metric icon="📈" label="Avg Daily" value={(filtered.length/Math.max(1,dailyArr.length)).toFixed(1)} sub="Sales per day" color="var(--teal)"/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:16,marginBottom:16}} className="full-mobile">

            <h3 style={{fontSize:'.78rem',fontWeight:900,color:'var(--muted)',textTransform:'uppercase',marginBottom:16}}>📊 Sales Trend</h3>

                <span style={{fontSize:'1rem',fontWeight:900,color:s.c}}>{s.v}</span>
              </div>
            ))}
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}} className="full-mobile">
          <div style={{background:'#fff',borderRadius:14,padding:22,boxShadow:'var(--sh-md)'}}>
            <h3 style={{fontSize:'.78rem',fontWeight:900,color:'var(--muted)',textTransform:'uppercase',marginBottom:16}}>By Supplier</h3>

                  <td style={{padding:'14px 18px',borderBottom:'1px solid var(--border)',fontWeight:900,color:'var(--green-dk)'}}>{a.done}</td>

}

/* ═══════════════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════════════ */
function App(){
  const[user,setUser]=useState(null);
  const[view,setView]=useState('sales');
  const[step,setStep]=useState(0);
  const[sel,setSel]=useState({state:null,utils:[],supplier:null,rate:null,phone:''});
  const[toast,setToast]=useState(null);

  const showToast=(msg,type='success')=>setToast({msg,type});

  const canGo=n=>{
    if(n<=step)return true;
    if(n>=1&&!sel.phone)return false;
    if(n>=2&&!sel.state)return false;
    if(n>=3&&!sel.utils.length)return false;
    if(n>=4&&!sel.supplier)return false;
    return true;
  };
  const goStep=n=>{
    if(!canGo(n)){
      if(n>=1&&!sel.phone)showToast('⚠ Verify DNC first','warn');
      else if(n>=2&&!sel.state)showToast('⚠ Select a state','warn');
      else if(n>=3&&!sel.utils.length)showToast('⚠ Select a utility','warn');
      else if(n>=4&&!sel.supplier)showToast('⚠ Select a supplier','warn');
      return;
    }
    setStep(n);
  };
  const reset=()=>{setSel({state:null,utils:[],supplier:null,rate:null,phone:''});setStep(0);};
  const toggleUtil=u=>{
    setSel(p=>{
      const exists=p.utils.find(x=>x.id===u.id);
      if(exists)return{...p,utils:p.utils.filter(x=>x.id!==u.id)};
      const keep=p.utils.filter(x=>x.type!==u.type);
      return{...p,utils:[...keep,u]};
    });
  };

  if(!user)return <LoginScreen onLogin={setUser}/>;

  return(
    <div style={{minHeight:'100vh',background:'var(--bg)'}}>
      {/* HEADER */}
      <div style={{background:'var(--orange)',padding:'0 20px',height:58,display:'flex',alignItems:'center',
        justifyContent:'space-between',boxShadow:'0 2px 12px rgba(244,124,32,.35)',position:'sticky',top:0,zIndex:50}}>
        <h1 style={{fontSize:'1.15rem',fontWeight:900,color:'#fff',letterSpacing:'.04em',
          display:'flex',alignItems:'center',gap:10,margin:0}}>
          <span style={{fontSize:'1.6rem'}}>⚡</span>
          <span className="hide-mobile">Energy Dashboard</span>
        </h1>
        <div style={{display:'flex',alignItems:'center',gap:8}} className="stack-mobile">
          <div style={{display:'flex',borderRadius:10,overflow:'hidden',border:'1px solid rgba(255,255,255,.3)'}}>
            <button onClick={()=>setView('sales')} style={{padding:'7px 16px',border:'none',
              background:view==='sales'?'rgba(255,255,255,.22)':'transparent',color:'#fff',fontWeight:800,
              fontSize:'.72rem',cursor:'pointer'}}>⚡ Sales</button>
            <button onClick={()=>setView('crm')} style={{padding:'7px 16px',border:'none',
              background:view==='crm'?'rgba(255,255,255,.22)':'transparent',color:'#fff',fontWeight:800,
              fontSize:'.72rem',cursor:'pointer'}}>📈 CRM</button>
          </div>
          <div style={{background:'rgba(255,255,255,.14)',border:'1px solid rgba(255,255,255,.22)',borderRadius:10,
            padding:'6px 14px',color:'#fff',fontSize:'.75rem',fontWeight:800,display:'flex',alignItems:'center',gap:8}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:user.role==='admin'?'var(--yellow)':'var(--green)',
              boxShadow:`0 0 6px ${user.role==='admin'?'rgba(255,193,7,.5)':'rgba(46,204,113,.5)'}`}}/>
            <span className="hide-mobile">{user.name} · </span>{user.role==='admin'?'Admin':'Agent'}
          </div>
          <button onClick={()=>setUser(null)} style={{background:'linear-gradient(135deg,#E53935,#C62828)',
            border:'none',color:'#fff',padding:'7px 14px',borderRadius:8,fontWeight:800,fontSize:'.73rem',
            cursor:'pointer',display:'flex',alignItems:'center',gap:5}}>
            🚪 <span className="hide-mobile">Logout</span>
          </button>
        </div>
      </div>

      {/* SALES VIEW */}
      {view==='sales'&&(<>
        <StepNav current={step} onGo={goStep}/>
        <div style={{padding:'22px 28px 60px',maxWidth:1200,margin:'0 auto'}}>
          <ContextBar sel={sel}/>
          {step===0&&<StepDNC onClear={phone=>{setSel(p=>({...p,phone}));setStep(1);}}/>}
          {step===1&&<StepState onSelect={s=>{setSel(p=>({...p,state:s,utils:[]}));setStep(2);}}/>}
          {step===2&&<StepUtility stateId={sel.state?.id} selected={sel.utils} onToggle={toggleUtil}
            onProceed={()=>setStep(3)}/>}
          {step===3&&<StepSupplier onSelect={(sup,rate)=>{setSel(p=>({...p,supplier:sup,rate}));setStep(4);}}/>}
          {step===4&&<StepChecklist sel={sel} user={user} onHome={reset} showToast={showToast}/>}
          {step>0&&(
            <div style={{marginTop:20}}>
              <button onClick={()=>setStep(step-1)} style={{background:'#fff',color:'var(--muted)',
                border:'2px solid var(--border)',borderRadius:10,padding:'10px 22px',fontWeight:800,
                fontSize:'.85rem',cursor:'pointer',display:'flex',alignItems:'center',gap:6}}>
                ← Back
              </button>
            </div>
          )}
        </div>
      </>)}

      {/* CRM VIEW */}
      {view==='crm'&&(
        <div style={{padding:'22px 28px 60px',maxWidth:1200,margin:'0 auto'}}>
          <CRMDashboard user={user}/>
        </div>
      )}

      {/* TOAST */}
      {toast&&<Toast msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
