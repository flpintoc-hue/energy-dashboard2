<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Dashboard - Secure</title>
    
    <!-- Google Maps API -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDd05Tpk1Jkg5ITlZFCvJrQl2ZGOdi0LiA&libraries=places"></script>
    
    <!-- DOMPurify para sanitización XSS -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    
    <style>
        :root {
            --bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: #ffffff;
            --text-dark: #2d3748;
            --text-light: #718096;
            --primary: #5a67d8;
            --primary-hover: #4c51bf;
            --success: #48bb78;
            --error: #f56565;
            --warning: #ed8936;
            --border: #e2e8f0;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text-dark);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            background: white;
            box-shadow: var(--shadow);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-radius: 12px;
        }

        .header-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }

        .header-user {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-badge {
            background: var(--primary);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .btn-logout {
            background: var(--error);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            background: #e53e3e;
            transform: translateY(-1px);
        }

        /* Login Screen */
        .login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 400px;
        }

        .login-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-dark);
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(90, 103, 216, 0.1);
        }

        .btn-primary {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Sales Flow */
        .sales-flow {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: var(--shadow);
        }

        .progress-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            position: relative;
        }

        .progress-bar::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--border);
            z-index: 0;
        }

        .progress-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            position: relative;
            z-index: 1;
        }

        .step-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: white;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 8px;
        }

        .step-circle.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .step-circle.completed {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }

        .step-label {
            font-size: 12px;
            color: var(--text-light);
            text-align: center;
        }

        .step-content {
            display: none;
        }

        .step-content.active {
            display: block;
        }

        /* Forms */
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .dnc-check {
            background: #f7fafc;
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .dnc-result {
            display: none;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            font-weight: 500;
        }

        .dnc-result.safe {
            background: #c6f6d5;
            color: #22543d;
            display: block;
        }

        .dnc-result.blocked {
            background: #fed7d7;
            color: #742a2a;
            display: block;
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 30px;
        }

        .btn-secondary {
            background: var(--text-light);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: #4a5568;
        }

        .btn-success {
            background: var(--success);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-success:hover {
            background: #38a169;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 16px 20px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            display: none;
            align-items: center;
            gap: 12px;
            z-index: 1000;
            min-width: 300px;
        }

        .toast.show {
            display: flex;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast.success {
            border-left: 4px solid var(--success);
        }

        .toast.error {
            border-left: 4px solid var(--error);
        }

        .toast.warning {
            border-left: 4px solid var(--warning);
        }

        /* Loading */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loading-overlay.show {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Template Display */
        .template-display {
            background: #f7fafc;
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            font-family: monospace;
            white-space: pre-wrap;
            font-size: 13px;
            max-height: 400px;
            overflow-y: auto;
        }

        .copy-button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .copy-button:hover {
            background: var(--primary-hover);
        }

        /* Utility Classes */
        .hidden {
            display: none !important;
        }

        .text-error {
            color: var(--error);
            font-size: 13px;
            margin-top: 5px;
        }

        .text-success {
            color: var(--success);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            .button-group button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <span id="toast-message"></span>
    </div>

    <!-- App Container -->
    <div id="app"></div>

    <script>
        // ═══════════════════════════════════════════════════════
        // CONFIGURACIÓN SEGURA
        // ═══════════════════════════════════════════════════════
        
        const CONFIG = {
            WORKER_URL: 'https://energy-dashboard-proxy.flpintoc.workers.dev',
            GOOGLE_MAPS_KEY: 'AIzaSyDd05Tpk1Jkg5ITlZFCvJrQl2ZGOdi0LiA',
            TOKEN_KEY: 'energy_dash_token',
            USER_KEY: 'energy_dash_user'
        };

        // ═══════════════════════════════════════════════════════
        // UTILIDADES
        // ═══════════════════════════════════════════════════════

        const Utils = {
            // Sanitizar HTML para prevenir XSS
            sanitize(html) {
                return DOMPurify.sanitize(html);
            },

            // Mostrar loading
            showLoading() {
                document.getElementById('loading-overlay').classList.add('show');
            },

            // Ocultar loading
            hideLoading() {
                document.getElementById('loading-overlay').classList.remove('show');
            },

            // Mostrar toast
            showToast(message, type = 'success') {
                const toast = document.getElementById('toast');
                const toastMessage = document.getElementById('toast-message');
                
                toast.className = `toast ${type} show`;
                toastMessage.textContent = message;
                
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            },

            // Guardar token
            saveToken(token) {
                localStorage.setItem(CONFIG.TOKEN_KEY, token);
            },

            // Obtener token
            getToken() {
                return localStorage.getItem(CONFIG.TOKEN_KEY);
            },

            // Guardar usuario
            saveUser(user) {
                localStorage.setItem(CONFIG.USER_KEY, JSON.stringify(user));
            },

            // Obtener usuario
            getUser() {
                const user = localStorage.getItem(CONFIG.USER_KEY);
                return user ? JSON.parse(user) : null;
            },

            // Limpiar sesión
            clearSession() {
                localStorage.removeItem(CONFIG.TOKEN_KEY);
                localStorage.removeItem(CONFIG.USER_KEY);
            },

            // Verificar si token está expirado (decodificar JWT básico)
            isTokenExpired() {
                const token = this.getToken();
                if (!token) return true;

                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    const now = Math.floor(Date.now() / 1000);
                    return payload.exp < now;
                } catch (e) {
                    return true;
                }
            }
        };

        // ═══════════════════════════════════════════════════════
        // API SERVICE CON JWT
        // ═══════════════════════════════════════════════════════

        const API = {
            // Request autenticado con JWT
            async authenticatedFetch(endpoint, data = {}) {
                const token = Utils.getToken();
                
                if (!token) {
                    throw new Error('No authentication token');
                }

                if (Utils.isTokenExpired()) {
                    Utils.clearSession();
                    throw new Error('Token expired');
                }

                try {
                    const response = await fetch(`${CONFIG.WORKER_URL}${endpoint}`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(data)
                    });

                    const result = await response.json();

                    if (!response.ok) {
                        throw new Error(result.error || 'Request failed');
                    }

                    return result;
                } catch (error) {
                    console.error('API Error:', error);
                    throw error;
                }
            },

            // Login (sin autenticación)
            async login(username, password) {
                try {
                    const response = await fetch(`${CONFIG.WORKER_URL}/api/auth/login`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ username, password })
                    });

                    const result = await response.json();

                    if (!response.ok) {
                        throw new Error(result.error || 'Login failed');
                    }

                    return result;
                } catch (error) {
                    console.error('Login Error:', error);
                    throw error;
                }
            },

            // Verificar DNC
            async checkDNC(phone) {
                return this.authenticatedFetch('/api/data/check_dnc', { 
                    action: 'check_dnc',
                    phone 
                });
            },

            // Obtener estados
            async getStates() {
                return this.authenticatedFetch('/api/data/get_states', {
                    action: 'get_states'
                });
            },

            // Obtener utilities
            async getUtilities() {
                return this.authenticatedFetch('/api/data/get_utilities', {
                    action: 'get_utilities'
                });
            },

            // Obtener rates
            async getRates() {
                return this.authenticatedFetch('/api/data/get_rates', {
                    action: 'get_rates'
                });
            },

            // Guardar venta
            async saveSale(saleData) {
                return this.authenticatedFetch('/api/data/save_sale', {
                    action: 'save_sale',
                    ...saleData
                });
            },

            // Enviar WhatsApp (ahora desde servidor)
            async sendWhatsApp(phone, message) {
                return this.authenticatedFetch('/api/notifications/whatsapp', {
                    to: phone,
                    message: message
                });
            }
        };

        // ═══════════════════════════════════════════════════════
        // STATE MANAGEMENT
        // ═══════════════════════════════════════════════════════

        const State = {
            currentStep: 1,
            totalSteps: 5,
            formData: {
                // Step 1: Customer Info
                firstName: '',
                lastName: '',
                phone: '',
                email: '',
                
                // Step 2: Address
                address: '',
                city: '',
                state: '',
                zipCode: '',
                apartment: '',
                
                // Step 3: Utility Info
                utility: '',
                utilityAccount: '',
                podId: '',
                
                // Step 4: Service Selection
                supplier: '',
                rate: '',
                term: '',
                
                // Step 5: Confirmation
                notes: ''
            },
            
            // Estados disponibles
            states: [],
            utilities: [],
            rates: [],

            reset() {
                this.currentStep = 1;
                this.formData = {
                    firstName: '',
                    lastName: '',
                    phone: '',
                    email: '',
                    address: '',
                    city: '',
                    state: '',
                    zipCode: '',
                    apartment: '',
                    utility: '',
                    utilityAccount: '',
                    podId: '',
                    supplier: '',
                    rate: '',
                    term: '',
                    notes: ''
                };
            }
        };

        // ═══════════════════════════════════════════════════════
        // COMPONENTES UI
        // ═══════════════════════════════════════════════════════

        const Components = {
            // Header
            header() {
                const user = Utils.getUser();
                return `
                    <div class="header">
                        <div class="header-title">⚡ Energy Dashboard</div>
                        <div class="header-user">
                            <div class="user-badge">${Utils.sanitize(user.fullName)} (${Utils.sanitize(user.role)})</div>
                            <button class="btn-logout" onclick="App.logout()">Logout</button>
                        </div>
                    </div>
                `;
            },

            // Login Screen
            loginScreen() {
                return `
                    <div class="login-screen">
                        <div class="login-card">
                            <div class="login-title">⚡ Energy Dashboard</div>
                            <form id="login-form" onsubmit="App.handleLogin(event)">
                                <div class="form-group">
                                    <label class="form-label">Username</label>
                                    <input type="text" class="form-input" name="username" required autocomplete="username">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Password</label>
                                    <input type="password" class="form-input" name="password" required autocomplete="current-password">
                                </div>
                                <button type="submit" class="btn-primary">Login</button>
                            </form>
                        </div>
                    </div>
                `;
            },

            // Progress Bar
            progressBar() {
                const steps = ['Customer', 'Address', 'Utility', 'Service', 'Review'];
                let html = '<div class="progress-bar">';
                
                for (let i = 1; i <= State.totalSteps; i++) {
                    const isActive = i === State.currentStep;
                    const isCompleted = i < State.currentStep;
                    const circleClass = isActive ? 'active' : (isCompleted ? 'completed' : '');
                    
                    html += `
                        <div class="progress-step">
                            <div class="step-circle ${circleClass}">${i}</div>
                            <div class="step-label">${steps[i-1]}</div>
                        </div>
                    `;
                }
                
                html += '</div>';
                return html;
            },

            // Step 1: Customer Info
            step1() {
                return `
                    <div class="step-content active">
                        <h2 style="margin-bottom: 25px;">Customer Information</h2>
                        
                        <!-- DNC Check -->
                        <div class="dnc-check">
                            <label class="form-label">Check Phone Number (DNC)</label>
                            <div style="display: flex; gap: 10px;">
                                <input type="tel" class="form-input" id="dnc-phone" placeholder="(123) 456-7890">
                                <button type="button" class="btn-primary" style="width: auto; padding: 0 30px;" onclick="App.checkDNC()">Check</button>
                            </div>
                            <div id="dnc-result" class="dnc-result"></div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">First Name *</label>
                                <input type="text" class="form-input" name="firstName" value="${State.formData.firstName}" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Last Name *</label>
                                <input type="text" class="form-input" name="lastName" value="${State.formData.lastName}" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Phone *</label>
                                <input type="tel" class="form-input" name="phone" value="${State.formData.phone}" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-input" name="email" value="${State.formData.email}">
                            </div>
                        </div>

                        <div class="button-group">
                            <button type="button" class="btn-primary" onclick="App.nextStep()">Next</button>
                        </div>
                    </div>
                `;
            },

            // Step 2: Address
            step2() {
                return `
                    <div class="step-content active">
                        <h2 style="margin-bottom: 25px;">Service Address</h2>

                        <div class="form-group">
                            <label class="form-label">Street Address *</label>
                            <input type="text" class="form-input" id="address-autocomplete" name="address" value="${State.formData.address}" required>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">City *</label>
                                <input type="text" class="form-input" name="city" value="${State.formData.city}" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">State *</label>
                                <input type="text" class="form-input" name="state" value="${State.formData.state}" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">ZIP Code *</label>
                                <input type="text" class="form-input" name="zipCode" value="${State.formData.zipCode}" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Apartment/Unit</label>
                                <input type="text" class="form-input" name="apartment" value="${State.formData.apartment}">
                            </div>
                        </div>

                        <div class="button-group">
                            <button type="button" class="btn-secondary" onclick="App.prevStep()">Back</button>
                            <button type="button" class="btn-primary" onclick="App.nextStep()">Next</button>
                        </div>
                    </div>
                `;
            },

            // Step 3: Utility Info
            step3() {
                return `
                    <div class="step-content active">
                        <h2 style="margin-bottom: 25px;">Utility Information</h2>

                        <div class="form-group">
                            <label class="form-label">Utility Company *</label>
                            <select class="form-input" name="utility" required>
                                <option value="">Select Utility</option>
                                <option value="ComEd">ComEd</option>
                                <option value="Ameren">Ameren</option>
                                <option value="PECO">PECO</option>
                                <option value="BGE">BGE</option>
                            </select>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Account Number *</label>
                                <input type="text" class="form-input" name="utilityAccount" value="${State.formData.utilityAccount}" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">POD ID / Service #</label>
                                <input type="text" class="form-input" name="podId" value="${State.formData.podId}">
                            </div>
                        </div>

                        <div class="button-group">
                            <button type="button" class="btn-secondary" onclick="App.prevStep()">Back</button>
                            <button type="button" class="btn-primary" onclick="App.nextStep()">Next</button>
                        </div>
                    </div>
                `;
            },

            // Step 4: Service Selection
            step4() {
                return `
                    <div class="step-content active">
                        <h2 style="margin-bottom: 25px;">Service Selection</h2>

                        <div class="form-group">
                            <label class="form-label">Energy Supplier *</label>
                            <select class="form-input" name="supplier" required>
                                <option value="">Select Supplier</option>
                                <option value="Inspire">Inspire Energy</option>
                                <option value="Constellation">Constellation</option>
                                <option value="Direct Energy">Direct Energy</option>
                            </select>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Rate (¢/kWh) *</label>
                                <input type="number" step="0.01" class="form-input" name="rate" value="${State.formData.rate}" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Contract Term *</label>
                                <select class="form-input" name="term" required>
                                    <option value="">Select Term</option>
                                    <option value="12">12 Months</option>
                                    <option value="24">24 Months</option>
                                    <option value="36">36 Months</option>
                                </select>
                            </div>
                        </div>

                        <div class="button-group">
                            <button type="button" class="btn-secondary" onclick="App.prevStep()">Back</button>
                            <button type="button" class="btn-primary" onclick="App.nextStep()">Next</button>
                        </div>
                    </div>
                `;
            },

            // Step 5: Review & Submit
            step5() {
                const template = App.generateTemplate();
                return `
                    <div class="step-content active">
                        <h2 style="margin-bottom: 25px;">Review & Submit</h2>

                        <div class="template-display">${Utils.sanitize(template)}</div>

                        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                            <button type="button" class="copy-button" onclick="App.copyTemplate()">📋 Copy Template</button>
                            <button type="button" class="copy-button" onclick="App.sendWhatsApp()">📱 Send WhatsApp</button>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Additional Notes</label>
                            <textarea class="form-input" name="notes" rows="4" placeholder="Any additional information...">${State.formData.notes}</textarea>
                        </div>

                        <div class="button-group">
                            <button type="button" class="btn-secondary" onclick="App.prevStep()">Back</button>
                            <button type="button" class="btn-success" onclick="App.submitSale()">Submit Sale</button>
                        </div>
                    </div>
                `;
            },

            // Sales Flow
            salesFlow() {
                let stepContent = '';
                switch (State.currentStep) {
                    case 1: stepContent = this.step1(); break;
                    case 2: stepContent = this.step2(); break;
                    case 3: stepContent = this.step3(); break;
                    case 4: stepContent = this.step4(); break;
                    case 5: stepContent = this.step5(); break;
                }

                return `
                    <div class="container">
                        ${this.header()}
                        <div class="sales-flow">
                            ${this.progressBar()}
                            <form id="sales-form" onsubmit="event.preventDefault();">
                                ${stepContent}
                            </form>
                        </div>
                    </div>
                `;
            }
        };

        // ═══════════════════════════════════════════════════════
        // APP PRINCIPAL
        // ═══════════════════════════════════════════════════════

        const App = {
            init() {
                // Verificar si hay sesión activa
                const token = Utils.getToken();
                const user = Utils.getUser();

                if (token && user && !Utils.isTokenExpired()) {
                    this.render('sales');
                } else {
                    Utils.clearSession();
                    this.render('login');
                }

                // Inicializar Google Places Autocomplete después de render
                setTimeout(() => this.initAutocomplete(), 100);
            },

            render(view) {
                const app = document.getElementById('app');
                
                if (view === 'login') {
                    app.innerHTML = Components.loginScreen();
                } else if (view === 'sales') {
                    app.innerHTML = Components.salesFlow();
                    // Re-inicializar autocomplete después de cada render
                    setTimeout(() => this.initAutocomplete(), 100);
                }
            },

            async handleLogin(event) {
                event.preventDefault();
                
                const form = event.target;
                const username = form.username.value;
                const password = form.password.value;

                Utils.showLoading();

                try {
                    const result = await API.login(username, password);
                    
                    if (result.success && result.token) {
                        Utils.saveToken(result.token);
                        Utils.saveUser(result.user);
                        Utils.showToast('Login successful!', 'success');
                        this.render('sales');
                    } else {
                        Utils.showToast(result.error || 'Login failed', 'error');
                    }
                } catch (error) {
                    Utils.showToast('Login error: ' + error.message, 'error');
                } finally {
                    Utils.hideLoading();
                }
            },

            logout() {
                Utils.clearSession();
                Utils.showToast('Logged out successfully', 'success');
                this.render('login');
            },

            // Inicializar Google Places Autocomplete
            initAutocomplete() {
                const input = document.getElementById('address-autocomplete');
                if (!input) return;

                const autocomplete = new google.maps.places.Autocomplete(input, {
                    types: ['address'],
                    componentRestrictions: { country: 'us' }
                });

                autocomplete.addListener('place_changed', () => {
                    const place = autocomplete.getPlace();
                    
                    if (place.address_components) {
                        const getComponent = (type) => {
                            const component = place.address_components.find(c => c.types.includes(type));
                            return component ? component.long_name : '';
                        };

                        // Rellenar campos automáticamente
                        const form = document.getElementById('sales-form');
                        form.address.value = `${getComponent('street_number')} ${getComponent('route')}`;
                        form.city.value = getComponent('locality') || getComponent('sublocality');
                        form.state.value = getComponent('administrative_area_level_1');
                        form.zipCode.value = getComponent('postal_code');
                    }
                });
            },

            // Verificar DNC
            async checkDNC() {
                const phoneInput = document.getElementById('dnc-phone');
                const phone = phoneInput.value.replace(/\D/g, '');
                
                if (phone.length < 10) {
                    Utils.showToast('Please enter a valid phone number', 'error');
                    return;
                }

                Utils.showLoading();

                try {
                    const result = await API.checkDNC(phone);
                    const resultDiv = document.getElementById('dnc-result');
                    
                    if (result.blocked) {
                        resultDiv.className = 'dnc-result blocked';
                        resultDiv.textContent = '⚠️ This number is on the DNC list!';
                    } else {
                        resultDiv.className = 'dnc-result safe';
                        resultDiv.textContent = '✓ Safe to call';
                        // Auto-rellenar el teléfono en el formulario
                        document.querySelector('[name="phone"]').value = phoneInput.value;
                    }
                } catch (error) {
                    Utils.showToast('Error checking DNC: ' + error.message, 'error');
                } finally {
                    Utils.hideLoading();
                }
            },

            // Navegar al siguiente paso
            nextStep() {
                // Capturar datos del formulario actual
                const form = document.getElementById('sales-form');
                const inputs = form.querySelectorAll('input, select, textarea');
                
                inputs.forEach(input => {
                    if (input.name && State.formData.hasOwnProperty(input.name)) {
                        State.formData[input.name] = input.value;
                    }
                });

                // Validar step actual
                if (!this.validateCurrentStep()) {
                    return;
                }

                if (State.currentStep < State.totalSteps) {
                    State.currentStep++;
                    this.render('sales');
                }
            },

            // Navegar al paso anterior
            prevStep() {
                // Guardar datos antes de retroceder
                const form = document.getElementById('sales-form');
                const inputs = form.querySelectorAll('input, select, textarea');
                
                inputs.forEach(input => {
                    if (input.name && State.formData.hasOwnProperty(input.name)) {
                        State.formData[input.name] = input.value;
                    }
                });

                if (State.currentStep > 1) {
                    State.currentStep--;
                    this.render('sales');
                }
            },

            // Validar step actual
            validateCurrentStep() {
                const form = document.getElementById('sales-form');
                const requiredInputs = form.querySelectorAll('[required]');
                
                for (let input of requiredInputs) {
                    if (!input.value.trim()) {
                        Utils.showToast('Please fill all required fields', 'error');
                        input.focus();
                        return false;
                    }
                }
                
                return true;
            },

            // Generar template para copiar
            generateTemplate() {
                const d = State.formData;
                const user = Utils.getUser();
                
                return `
═══════════════════════════════════════
ENERGY SALE - ${d.firstName} ${d.lastName}
═══════════════════════════════════════

👤 CUSTOMER INFO
Name: ${d.firstName} ${d.lastName}
Phone: ${d.phone}
Email: ${d.email || 'N/A'}

📍 SERVICE ADDRESS
${d.address}
${d.apartment ? 'Unit: ' + d.apartment : ''}
${d.city}, ${d.state} ${d.zipCode}

⚡ UTILITY INFORMATION
Utility: ${d.utility}
Account #: ${d.utilityAccount}
${d.podId ? 'POD ID: ' + d.podId : ''}

💼 SERVICE DETAILS
Supplier: ${d.supplier}
Rate: ${d.rate}¢/kWh
Term: ${d.term} months

📝 NOTES
${d.notes || 'No additional notes'}

Agent: ${user.fullName}
Date: ${new Date().toLocaleString()}
═══════════════════════════════════════
                `.trim();
            },

            // Copiar template al portapapeles
            async copyTemplate() {
                const template = this.generateTemplate();
                
                try {
                    await navigator.clipboard.writeText(template);
                    Utils.showToast('Template copied to clipboard!', 'success');
                } catch (error) {
                    Utils.showToast('Failed to copy template', 'error');
                }
            },

            // Enviar WhatsApp
            async sendWhatsApp() {
                const phone = State.formData.phone.replace(/\D/g, '');
                const template = this.generateTemplate();
                
                if (!phone || phone.length < 10) {
                    Utils.showToast('Invalid phone number', 'error');
                    return;
                }

                Utils.showLoading();

                try {
                    const result = await API.sendWhatsApp(phone, template);
                    
                    if (result.success) {
                        Utils.showToast('WhatsApp message sent!', 'success');
                    } else {
                        Utils.showToast('Failed to send WhatsApp', 'error');
                    }
                } catch (error) {
                    Utils.showToast('WhatsApp error: ' + error.message, 'error');
                } finally {
                    Utils.hideLoading();
                }
            },

            // Enviar venta
            async submitSale() {
                if (!confirm('Submit this sale?')) {
                    return;
                }

                Utils.showLoading();

                try {
                    const user = Utils.getUser();
                    const saleData = {
                        ...State.formData,
                        agent: user.username,
                        agentName: user.fullName,
                        timestamp: new Date().toISOString()
                    };

                    const result = await API.saveSale(saleData);
                    
                    if (result.success) {
                        Utils.showToast('Sale submitted successfully!', 'success');
                        State.reset();
                        this.render('sales');
                    } else {
                        Utils.showToast('Failed to submit sale: ' + result.error, 'error');
                    }
                } catch (error) {
                    Utils.showToast('Submission error: ' + error.message, 'error');
                } finally {
                    Utils.hideLoading();
                }
            }
        };

        // ═══════════════════════════════════════════════════════
        // INICIALIZAR APP
        // ═══════════════════════════════════════════════════════

        document.addEventListener('DOMContentLoaded', () => {
            App.init();
        });
    </script>
</body>
</html>
